<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📝 Notes Management System</h1>

        <input type="text" id="title" placeholder="Enter Note Title">

        <textarea id="note" placeholder="Write your note here..."></textarea>

        <button onclick="addNote()">Add Note</button>

        <input type="text" id="search" placeholder="Search Notes..." onkeyup="searchNotes()">

        <div id="notesContainer"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
